name: Enterprise Production Pipeline with Auto-Rollback

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: "ghcr.io/lijo-cloud/gocart"

jobs:
  test:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --if-present

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          IMAGE=$(echo "${{ env.DOCKER_IMAGE }}" | tr '[:upper:]' '[:lower:]')
          echo "image_tag=$IMAGE:$SHORT_SHA" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image_tag }}
            ghcr.io/lijo-cloud/gocart:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security_scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      # 🛡️ FIXED: Pinned to exact verified Commit SHA due to March 2026 supply-chain attack risks
      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@18f2510ee396bca4007aa214d054acb818c179c1 
        with:
          image-ref: ${{ needs.build-and-push.outputs.image_tag }}
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-push, security_scan]
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy & Verify Staging
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ vars.STAGING_SERVER_IP }} \
            "export IMAGE_TAG='$IMAGE_TAG'; export DATABASE_URL='$DATABASE_URL'; bash -s" << 'EOF'
            mkdir -p /app && cd /app
            docker compose pull --quiet
            docker compose up -d --remove-orphans
            docker image prune -f
            
            echo "⏳ Waiting 30s for Staging container..."
            sleep 30
            
            if curl -f http://localhost:3000/api/health; then
              echo "✅ Staging environment is healthy!"
            else
              echo "❌ Staging failed health check!"
              exit 1
            fi
          EOF

  approve_production:
    name: Gate Production Approval
    runs-on: ubuntu-latest
    needs: deploy_staging
    environment: production
    steps:
      - run: echo "🚀 Promotion authorized by administrator."

  deploy_production:
    name: Rolling Production Deploy with Auto-Rollback
    runs-on: ubuntu-latest
    needs: [build-and-push, approve_production]
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # ================= SERVER 1 =================
      - name: Deploy & Validate Server 1
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ vars.PROD_SERVER_1_IP }} \
            "export IMAGE_TAG='$IMAGE_TAG'; export DATABASE_URL='$DATABASE_URL'; export DOCKER_IMAGE='${{ env.DOCKER_IMAGE }}'; bash -s" << 'EOF'
            mkdir -p /app && cd /app
            
            # Run inside a try-catch block over standard bash syntax
            if {
              docker compose pull --quiet && \
              docker compose up -d --remove-orphans && \
              docker image prune -f && \
              echo "⏳ Waiting 30s for Server 1..." && \
              sleep 30 && \
              curl -f http://localhost:3000/api/health
            }; then
              echo "✅ Server 1 successfully running new deployment."
            else
              echo "🚨 Server 1 FAILED health checks! Triggering Automated Rollback..."
              
              # Rollback sequence: Re-target the standard latest tag backup image cleanly
              export IMAGE_TAG="$DOCKER_IMAGE:latest"
              docker compose up -d --remove-orphans
              
              echo "⚠️ Rollback execution completed on Server 1."
              exit 1
            fi
          EOF

      # ================= SERVER 2 =================
      - name: Deploy & Validate Server 2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ vars.PROD_SERVER_2_IP }} \
            "export IMAGE_TAG='$IMAGE_TAG'; export DATABASE_URL='$DATABASE_URL'; export DOCKER_IMAGE='${{ env.DOCKER_IMAGE }}'; bash -s" << 'EOF'
            mkdir -p /app && cd /app
            
            if {
              docker compose pull --quiet && \
              docker compose up -d --remove-orphans && \
              docker image prune -f && \
              echo "⏳ Waiting 30s for Server 2..." && \
              sleep 30 && \
              curl -f http://localhost:3000/api/health
            }; then
              echo "✅ Server 2 successfully running new deployment."
            else
              echo "🚨 Server 2 FAILED health checks! Triggering Automated Rollback..."
              
              export IMAGE_TAG="$DOCKER_IMAGE:latest"
              docker compose up -d --remove-orphans
              
              echo "⚠️ Rollback execution completed on Server 2."
              exit 1
            fi
          EOF
