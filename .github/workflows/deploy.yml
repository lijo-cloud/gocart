name: Production Deployment

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: "ghcr.io/lijo-cloud/gocart"

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      # - run: npm test --if-present
      # - run: npm audit --audit-level=high

  build_and_push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          IMAGE=$(echo ${{ env.DOCKER_IMAGE }} | tr '[:upper:]' '[:lower:]')
          echo "image_tag=$IMAGE:$SHORT_SHA" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.vars.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security_scan:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: build_and_push
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build_and_push.outputs.image_tag }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true

  deploy_staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [build_and_push, security_scan]
    env:
      IMAGE_TAG: ${{ needs.build_and_push.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      # ✅ Fixed SSH — use config file instead of ssh-agent
      - name: Write SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          echo -e "Host *\n\tStrictHostKeyChecking no\n\tIdentityFile ~/.ssh/deploy_key.pem\n" > ~/.ssh/config

      - name: Create Staging Context
        run: |
          docker context create staging \
            --docker "host=ssh://ubuntu@${{ vars.STAGING_SERVER_IP }}"

      - name: Deploy to Staging
        run: |
          IMAGE_TAG=${{ env.IMAGE_TAG }} \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context staging compose pull

          IMAGE_TAG=${{ env.IMAGE_TAG }} \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context staging compose up -d --remove-orphans

          docker --context staging image prune -f

      - name: Health Check Staging
        run: |
          echo "⏳ Waiting for Staging to be healthy (max 120s)..."
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              http://${{ vars.STAGING_SERVER_IP }}:3000/api/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Staging healthy! HTTP $STATUS"
              exit 0
            fi
            echo "Attempt $i/12: HTTP $STATUS"
            sleep 10
          done
          echo "❌ Staging failed health check after 120s"
          exit 1

  approve_production:
    name: Approve Production
    runs-on: ubuntu-latest
    needs: deploy_staging
    environment: production
    steps:
      - run: echo "✅ Approved"

  deploy_production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [build_and_push, approve_production]
    env:
      IMAGE_TAG: ${{ needs.build_and_push.outputs.image_tag }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # ✅ Fixed SSH — use config file instead of ssh-agent
      - name: Write SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          echo -e "Host *\n\tStrictHostKeyChecking no\n\tIdentityFile ~/.ssh/deploy_key.pem\n" > ~/.ssh/config

      - name: Create Docker Contexts
        run: |
          docker context create node1 \
            --docker "host=ssh://ubuntu@${{ vars.PROD_SERVER_1_IP }}"
          docker context create node2 \
            --docker "host=ssh://ubuntu@${{ vars.PROD_SERVER_2_IP }}"

      # ---- Server 1 ----
      - name: Deploy to Server 1
        run: |
          IMAGE_TAG=${{ env.IMAGE_TAG }} \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context node1 compose pull

          IMAGE_TAG=${{ env.IMAGE_TAG }} \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context node1 compose up -d --remove-orphans

          docker --context node1 image prune -f

      - name: Health Check Server 1
        run: |
          echo "⏳ Waiting for Server 1 to be healthy (max 120s)..."
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              http://${{ vars.PROD_SERVER_1_IP }}:3000/api/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Server 1 healthy! HTTP $STATUS"
              break
            fi
            echo "Attempt $i/12: HTTP $STATUS"
            sleep 10
          done
          [ "$STATUS" = "200" ] || (echo "❌ Server 1 unhealthy after 120s" && exit 1)

      # ---- Server 2 ----
      - name: Deploy to Server 2
        run: |
          IMAGE_TAG=${{ env.IMAGE_TAG }} \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context node2 compose pull

          IMAGE_TAG=${{ env.IMAGE_TAG }} \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context node2 compose up -d --remove-orphans

          docker --context node2 image prune -f

      - name: Health Check Server 2
        run: |
          echo "⏳ Waiting for Server 2 to be healthy (max 120s)..."
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              http://${{ vars.PROD_SERVER_2_IP }}:3000/api/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Server 2 healthy! HTTP $STATUS"
              break
            fi
            echo "Attempt $i/12: HTTP $STATUS"
            sleep 10
          done
          [ "$STATUS" = "200" ] || (echo "❌ Server 2 unhealthy after 120s" && exit 1)

      # ---- Final ALB check ----
      - name: Final Health Check via ALB
        run: |
          echo "⏳ Checking ALB health (max 60s)..."
          for i in {1..6}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              http://${{ secrets.ALB_URL }}/api/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ ALB healthy! HTTP $STATUS"
              exit 0
            fi
            echo "Attempt $i/6: HTTP $STATUS"
            sleep 10
          done
          echo "❌ ALB check failed after 60s"
          exit 1

      # ✅ Tag as stable after successful deploy
      - name: Tag as stable
        if: success()
        run: |
          docker login ghcr.io \
            -u ${{ github.actor }} \
            -p ${{ secrets.GITHUB_TOKEN }}
          docker buildx imagetools create \
            --tag ghcr.io/lijo-cloud/gocart:stable \
            ${{ env.IMAGE_TAG }}
          echo "✅ Tagged as stable"

      # ✅ Rollback to last stable on failure
      - name: Rollback on Failure
        if: failure()
        run: |
          echo "⚠️ Rolling back to stable"
          IMAGE_TAG=ghcr.io/lijo-cloud/gocart:stable \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context node1 compose up -d --remove-orphans || true

          IMAGE_TAG=ghcr.io/lijo-cloud/gocart:stable \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context node2 compose up -d --remove-orphans || true

          echo "✅ Rollback complete"