name: Enterprise Production Pipeline with Auto-Rollback

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: "ghcr.io/lijo-cloud/gocart"

jobs:
  test:
    name: Code Quality & Testing
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          IMAGE=$(echo "${{ env.DOCKER_IMAGE }}" | tr '[:upper:]' '[:lower:]')
          echo "image_tag=$IMAGE:$SHORT_SHA" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image_tag }}
            ghcr.io/lijo-cloud/gocart:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security_scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ needs.build-and-push.outputs.image_tag }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-push, security_scan]

    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy & Verify Staging
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ vars.STAGING_SERVER_IP }} \
            "export IMAGE_TAG='$IMAGE_TAG'; export DATABASE_URL='$DATABASE_URL'; export DOCKER_IMAGE='${{ env.DOCKER_IMAGE }}'; bash -s" << 'EOF'

            mkdir -p /app && cd /app

            CURRENT_IMAGE=$(docker compose images -q app)

            if [ ! -z "$CURRENT_IMAGE" ]; then
              docker tag $CURRENT_IMAGE $DOCKER_IMAGE:stable
            fi

            echo "🧹 Cleaning old Docker images..."
            docker image prune -f || true

            echo "📥 Pulling image on Staging..."
            docker compose pull --quiet || exit 1

            echo "🚀 Updating Staging container..."
            timeout 120 docker compose up -d --force-recreate --wait --no-deps app

            docker ps
            docker compose images

            echo "⏳ Verifying Staging health..."

            for i in $(seq 1 30); do
              if curl -f http://localhost:3000/api/health >/dev/null 2>&1; then
                echo "Healthy"
                break
              fi
              sleep 5
            done

            if curl -f http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "✅ Staging environment is healthy!"
              docker image prune -f
            else
              echo "🚨 Staging failed health check!"

              export IMAGE_TAG="$DOCKER_IMAGE:stable"
              
              docker compose pull --quiet   # ← add this line

              timeout 120 docker compose up -d --force-recreate --wait --no-deps app

              docker ps
              docker compose images

              exit 1
            fi
          EOF

  approve_production:
    name: Gate Production Approval
    runs-on: ubuntu-latest
    needs: deploy_staging
    environment: production

    steps:
      - run: echo "🚀 Promotion authorized by administrator."

  deploy_production:
    name: Immutable ASG Production Deploy
    runs-on: ubuntu-latest
    needs: [build-and-push, approve_production]

    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Get Latest Launch Template Version
        id: lt
        run: |
          VERSION=$(aws ec2 describe-launch-template-versions \
            --launch-template-id ${{ vars.LAUNCH_TEMPLATE_ID }} \
            --versions '$Latest' \
            --query 'LaunchTemplateVersions[0].VersionNumber' \
            --output text)

          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create New Launch Template Version
        run: |

          cat > userdata.sh <<EOF
          #!/bin/bash

          exec > /var/log/user-data.log 2>&1

          apt-get update -y
          apt-get install -y docker.io curl

          systemctl enable docker
          systemctl start docker

          mkdir -p /app
          cd /app

          echo "${{ secrets.DATABASE_URL }}" > .env
          echo "IMAGE_TAG=${IMAGE_TAG}" >> .env

          chmod 600 .env

          cat > docker-compose.yml <<EOL
          services:
            app:
              image: ${IMAGE_TAG}

              restart: always

              ports:
                - "3000:3000"

              env_file:
                - .env

              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
                interval: 30s
                timeout: 5s
                retries: 5
          EOL

          apt-get install -y awscli

          GHCR_PAT=$(aws ssm get-parameter \
            --name "/github/ghcr/token" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text \
            --region ap-south-1)

          echo "$GHCR_PAT" | docker login ghcr.io -u lijo-cloud --password-stdin

          docker compose pull
          docker compose up -d
          EOF

          ENCODED=$(base64 -w 0 userdata.sh)

          aws ec2 create-launch-template-version \
            --launch-template-id ${{ vars.LAUNCH_TEMPLATE_ID }} \
            --source-version ${{ steps.lt.outputs.version }} \
            --launch-template-data "{\"UserData\":\"$ENCODED\"}"

      - name: Set Latest Launch Template Version Default
        run: |

          VERSION=$(aws ec2 describe-launch-template-versions \
            --launch-template-id ${{ vars.LAUNCH_TEMPLATE_ID }} \
            --versions '$Latest' \
            --query 'LaunchTemplateVersions[0].VersionNumber' \
            --output text)

          aws ec2 modify-launch-template \
            --launch-template-id ${{ vars.LAUNCH_TEMPLATE_ID }} \
            --default-version $VERSION

      - name: Start ASG Instance Refresh
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ${{ vars.ASG_NAME }} \
            --preferences '{
              "MinHealthyPercentage": 50,
              "InstanceWarmup": 120
            }'