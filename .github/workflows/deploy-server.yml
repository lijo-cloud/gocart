name: Deploy to Server (Reusable)

on:
  workflow_call:
    inputs:
      host:
        required: true
        type: string
      image_tag:
        required: true
        type: string
    secrets:
      SSH_PRIVATE_KEY:
        required: true
      DATABASE_URL:
        required: true
      GH_PAT:
        required: true
      GH_USERNAME:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Save current image for rollback
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ inputs.host }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker inspect $(docker compose -f /app/docker-compose.yml ps -q app 2>/dev/null) \
              --format='{{index .Config.Image}}' 2>/dev/null \
              > /app/previous_image.txt \
              || echo "ghcr.io/lijo-cloud/gocart:latest" > /app/previous_image.txt
            echo "Saved: $(cat /app/previous_image.txt)"

      - name: Copy compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ inputs.host }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/app"

      - name: Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ inputs.host }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /app
            # ✅ PAT works reliably in reusable workflows
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io \
              -u ${{ secrets.GH_USERNAME }} --password-stdin
            export IMAGE_TAG=${{ inputs.image_tag }}
            export DATABASE_URL=${{ secrets.DATABASE_URL }}
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

      - name: Wait for container to boot
        run: sleep 30