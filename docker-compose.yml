services:
  app:
    image: ${IMAGE_TAG}
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # 🚀 FIX: Map the shared host volume directly to the Next.js static asset folder
      - next_static:/app/static_cache
      - next_static:/app/.next/static
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: ${DATABASE_URL}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"
volumes: 
  next_static: