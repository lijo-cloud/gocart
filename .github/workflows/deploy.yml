name: Production Deployment

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: "ghcr.io/lijo-cloud/gocart"

jobs:
  build_and_push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          IMAGE=$(echo ${{ env.DOCKER_IMAGE }} | tr '[:upper:]' '[:lower:]')
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "image_tag=$IMAGE:$SHORT_SHA" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image_tag }}
            ghcr.io/lijo-cloud/gocart:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Rolling Deploy
    runs-on: ubuntu-latest
    needs: build_and_push
    env:
      IMAGE_TAG: ${{ needs.build_and_push.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Write SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          echo -e "Host *\n\tStrictHostKeyChecking no\n\tIdentityFile ~/.ssh/deploy_key.pem\n" > ~/.ssh/config

      - name: Create Docker Contexts
        run: |
          docker context create node1 \
            --docker "host=ssh://ubuntu@${{ secrets.PROD_SERVER_1_IP }}"
          docker context create node2 \
            --docker "host=ssh://ubuntu@${{ secrets.PROD_SERVER_2_IP }}"

      # ---- Server 1 ----
      - name: Deploy to Server 1
        run: |
          IMAGE_TAG=${{ env.IMAGE_TAG }} \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context node1 compose pull

          IMAGE_TAG=${{ env.IMAGE_TAG }} \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context node1 compose up -d --remove-orphans

          docker --context node1 image prune -f

      # ✅ Wait for Server 1 container to boot, ALB will handle traffic shift
      - name: Wait for Server 1 to boot
        run: sleep 30

      # ---- Server 2 ----
      - name: Deploy to Server 2
        run: |
          IMAGE_TAG=${{ env.IMAGE_TAG }} \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context node2 compose pull

          IMAGE_TAG=${{ env.IMAGE_TAG }} \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context node2 compose up -d --remove-orphans

          docker --context node2 image prune -f

      - name: Wait for Server 2 to boot
        run: sleep 30

      # ✅ Final check via ALB — confirms both servers are serving traffic
      - name: Final Health Check via ALB
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            http://${{ secrets.ALB_URL }}/api/health)
          echo "ALB responded with HTTP $STATUS"
          [ "$STATUS" = "200" ] || (echo "❌ ALB health check failed" && exit 1)