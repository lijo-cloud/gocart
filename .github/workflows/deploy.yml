name: Enterprise Production Pipeline with Auto-Rollback

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: "ghcr.io/lijo-cloud/gocart"

permissions:
  id-token: write # Required for AWS OIDC authentication
  contents: read
  packages: write

jobs:
  test:
    name: Code Quality & Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          IMAGE=$(echo "${{ env.DOCKER_IMAGE }}" | tr '[:upper:]' '[:lower:]')
          echo "image_tag=$IMAGE:$SHORT_SHA" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PIPELINE_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          pull: true  # Forces Docker to look for new base image updates
          tags: |
            ${{ steps.vars.outputs.image_tag }}
            ghcr.io/lijo-cloud/gocart:latest
          # no-cache: true
          cache-from: type=gha # Tells Docker to pull cache from GitHub Actions
          cache-to: type=gha,mode=max #  Tells Docker to save cache to GitHub Actions

  security_scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ needs.build-and-push.outputs.image_tag }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-push, security_scan]
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
     #  NEW STEP 1: Add AWS OIDC auth (copy from deploy_production)
      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      #  NEW STEP 2: Fetch the secret HERE in the runner, not on the server
      - name: Fetch DB URL from SSM
        run: |
          DB_URL=$(aws ssm get-parameter \
            --name "/gocart/staging/database_url" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text \
            --region ap-south-1)
          echo "DB_URL=$DB_URL" >> $GITHUB_ENV

      #  MODIFIED STEP: sudo added, aws ssm call removed, DB_URL passed via env
      - name: Deploy & Verify Staging
        run: |
          scp -o StrictHostKeyChecking=no docker-compose.yml ubuntu@${{ vars.STAGING_SERVER_IP }}:/app/docker-compose.yml

          ssh -o StrictHostKeyChecking=no ubuntu@${{ vars.STAGING_SERVER_IP }} \
          "export IMAGE_TAG='$IMAGE_TAG'; export DOCKER_IMAGE='${{ env.DOCKER_IMAGE }}'; export DB_URL='${{ env.DB_URL }}'; bash -s" << 'EOF'
            set -e
            sudo mkdir -p /app && sudo chown ubuntu:ubuntu /app   #  fixes permission error
            cd /app
            if [ -z "$DB_URL" ]; then exit 1; fi                  #  no aws CLI needed on server
            printf "DATABASE_URL=%s\nIMAGE_TAG=%s\n" "$DB_URL" "$IMAGE_TAG" > /app/.env
            docker compose pull --quiet
            docker compose down --remove-orphans
            docker compose up -d
            sleep 40
            HEALTHY=false
            for i in $(seq 1 30); do
              if curl -f http://localhost:3000/api/health >/dev/null 2>&1; then HEALTHY=true; break; fi
              sleep 10
            done
            if [ "$HEALTHY" = true ]; then docker image prune -af --filter "until=24h" || true; else exit 1; fi
          EOF
          
  approve_production:
    name: Gate Production Approval
    runs-on: ubuntu-latest
    needs: deploy_staging
    environment: production
    steps:
      - run: echo "🚀 Promotion authorized."

  deploy_production:
    name: AWS CodeDeploy Production Deploy
    runs-on: ubuntu-latest
    needs: [build-and-push, approve_production]
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare Deployment Artifacts
        run: |
          mkdir -p deploy-bundle
          echo "export IMAGE_TAG='${{ env.IMAGE_TAG }}'" > deploy-bundle/deploy-env.sh
          cp appspec.yml deploy-bundle/ 2>/dev/null || true
          cp -r scripts deploy-bundle/ 2>/dev/null || mkdir -p deploy-bundle/scripts
          cp docker-compose.yml deploy-bundle/ 2>/dev/null || true

      - name: Upload Artifacts to S3 and Trigger CodeDeploy
        run: |
          cd deploy-bundle && zip -r ../deploy-package.zip . && cd ..
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          S3_KEY="gocart-deploy-$SHORT_SHA.zip"
          
          aws s3 cp deploy-package.zip "s3://${{ vars.AWS_DEPLOY_S3_BUCKET }}/production/$S3_KEY"
          
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name ${{ vars.CODEDEPLOY_APP_NAME }} \
            --deployment-group-name ${{ vars.CODEDEPLOY_GROUP_NAME }} \
            --file-exists-behavior OVERWRITE \
            --s3-location bucket=${{ vars.AWS_DEPLOY_S3_BUCKET }},bundleType=zip,key=production/$S3_KEY \
            --query "deploymentId" \
            --output text)
            
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_ENV

      - name: Monitor CodeDeploy Status
        run: |
          aws deploy wait deployment-successful --deployment-id ${{ env.deployment_id }}
          echo "✅ CodeDeploy execution successful!"
