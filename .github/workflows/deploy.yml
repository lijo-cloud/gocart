name: Production Deployment

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: "ghcr.io/lijo-cloud/gocart"

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      # - run: npm test --if-present
      # - run: npm audit --audit-level=high

  build_and_push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          IMAGE=$(echo ${{ env.DOCKER_IMAGE }} | tr '[:upper:]' '[:lower:]')
          echo "image_tag=$IMAGE:$SHORT_SHA" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.vars.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security_scan:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: build_and_push
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build_and_push.outputs.image_tag }}
          format: table
          severity: HIGH,CRITICAL
          exit-code: '0'
          ignore-unfixed: true

  deploy_staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [build_and_push, security_scan]
    env:
      IMAGE_TAG: ${{ needs.build_and_push.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Write SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          echo -e "Host *\n\tStrictHostKeyChecking no\n\tIdentityFile ~/.ssh/deploy_key.pem\n" > ~/.ssh/config

      - name: Create Staging Context
        run: |
          docker context create staging \
            --docker "host=ssh://ubuntu@${{ vars.STAGING_SERVER_IP }}"

      - name: Deploy to Staging
        run: |
          IMAGE_TAG=${{ env.IMAGE_TAG }} \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context staging compose down --remove-orphans || true

          IMAGE_TAG=${{ env.IMAGE_TAG }} \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context staging compose pull

          IMAGE_TAG=${{ env.IMAGE_TAG }} \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context staging compose up -d

          docker --context staging image prune -f

      - name: Health Check Staging
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            http://${{ vars.STAGING_SERVER_IP }}:3000/api/health || echo "000")
          echo "Staging: HTTP $STATUS"
          [ "$STATUS" = "200" ] || (echo "❌ Staging unhealthy" && exit 1)

  approve_production:
    name: Approve Production
    runs-on: ubuntu-latest
    needs: deploy_staging
    environment: production
    steps:
      - run: echo "✅ Approved"

  deploy_production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [build_and_push, approve_production]
    env:
      IMAGE_TAG: ${{ needs.build_and_push.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Write SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          echo -e "Host *\n\tStrictHostKeyChecking no\n\tIdentityFile ~/.ssh/deploy_key.pem\n" > ~/.ssh/config

      - name: Create Docker Contexts
        run: |
          docker context create node1 \
            --docker "host=ssh://ubuntu@${{ vars.PROD_SERVER_1_IP }}"
          docker context create node2 \
            --docker "host=ssh://ubuntu@${{ vars.PROD_SERVER_2_IP }}"

      # ---- Server 1 ----
      - name: Deploy to Server 1
        run: |
          IMAGE_TAG=${{ env.IMAGE_TAG }} \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context node1 compose down --remove-orphans || true

          IMAGE_TAG=${{ env.IMAGE_TAG }} \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context node1 compose pull

          IMAGE_TAG=${{ env.IMAGE_TAG }} \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context node1 compose up -d

          docker --context node1 image prune -f

      - name: Wait for Server 1
        run: sleep 30

      # ---- Server 2 ----
      - name: Deploy to Server 2
        run: |
          IMAGE_TAG=${{ env.IMAGE_TAG }} \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context node2 compose down --remove-orphans || true

          IMAGE_TAG=${{ env.IMAGE_TAG }} \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context node2 compose pull

          IMAGE_TAG=${{ env.IMAGE_TAG }} \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context node2 compose up -d

          docker --context node2 image prune -f

      - name: Wait for Server 2
        run: sleep 30

      # ---- Final ALB check ----
      - name: Final Health Check via ALB
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            http://${{ secrets.ALB_URL }}/api/health || echo "000")
          echo "ALB: HTTP $STATUS"
          [ "$STATUS" = "200" ] || (echo "❌ ALB check failed" && exit 1)

      # ✅ Tag as stable after successful deploy
      - name: Tag as stable
        if: success()
        run: |
          docker login ghcr.io \
            -u ${{ github.actor }} \
            -p ${{ secrets.GITHUB_TOKEN }}
          docker buildx imagetools create \
            --tag ghcr.io/lijo-cloud/gocart:stable \
            ${{ env.IMAGE_TAG }}
          echo "✅ ${{ env.IMAGE_TAG }} tagged as stable"

      # ✅ Rollback to last stable on failure
      - name: Rollback on Failure
        if: failure()
        run: |
          echo "⚠️ Rolling back to stable"

          IMAGE_TAG=ghcr.io/lijo-cloud/gocart:stable \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context node1 compose up -d || true

          IMAGE_TAG=ghcr.io/lijo-cloud/gocart:stable \
          DATABASE_URL=${{ secrets.DATABASE_URL }} \
          docker --context node2 compose up -d || true

          echo "✅ Rollback complete"