name: Automated GHCR Cleanup

on:
  schedule:
    - cron: '0 0 * * 0' #  Runs every Sunday at midnight UTC
  workflow_dispatch: #  Allows you to trigger it manually from the Actions tab

jobs:
  clean-old-images:
    runs-on: ubuntu-latest
    steps:
      - name: Prune Old Container Images
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          token: ${{ secrets.GHCR_PIPELINE_TOKEN }} #  Uses your new PAT for total admin access
          package: 'gocart'
          exclude-tags: 'latest' #  DO NOT delete the latest production tag
          keep-n-tagged: 5 #  Keep only the 5 most recent SHA versions
          keep-n-untagged: 0 #  Instantly wipe out untagged cache fragments
          dry-run: false    #  Change to 'false' ONLY after verifying logs look correct
          log-level: debug #  Optional: Use this if you want absolute maximum log detail
  clean-actions-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all Actions caches
        run: |
          gh extension install actions/gh-actions-cache
          CACHES=$(gh actions-cache list -R ${{ github.repository }} --limit 100 | cut -f1)
          for cache in $CACHES; do
            gh actions-cache delete "$cache" -R ${{ github.repository }} --confirm
          done
        env:
          GH_TOKEN: ${{ secrets.GHCR_PIPELINE_TOKEN }}