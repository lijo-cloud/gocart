name: Enterprise Production Pipeline with Auto-Rollback

on:
  push:
    branches:
      - main

env:
  NESTJS_IMAGE: "ghcr.io/lijo-cloud/gocart-api"
  NEXTJS_IMAGE: "ghcr.io/lijo-cloud/gocart-web"

permissions:
  id-token: write # Required for AWS OIDC authentication
  contents: read
  packages: write

jobs:
  test:
    name: Code Quality & Testing
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install Dependencies
        working-directory: ${{ matrix.app }}
        run: npm ci

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - name: api
            context: ./backend
            image: ghcr.io/lijo-cloud/gocart-api
          - name: web
            context: ./frontend
            image: ghcr.io/lijo-cloud/gocart-web
    outputs:
      nestjs_tag: ${{ steps.vars.outputs.nestjs_tag }}
      nextjs_tag: ${{ steps.vars.outputs.nextjs_tag }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PIPELINE_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          pull: true  # Forces Docker to look for new base image updates
          tags: |
            ${{ matrix.image }}:${{ steps.vars.outputs.short_sha }}
            ${{ matrix.image }}:latest
          # no-cache: true
          cache-from: type=gha # Tells Docker to pull cache from GitHub Actions
          cache-to: type=gha,mode=max #  Tells Docker to save cache to GitHub Actions

  security_scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-and-push

    strategy:
      matrix:
        image:
          - ghcr.io/lijo-cloud/gocart-api
          - ghcr.io/lijo-cloud/gocart-web

    steps:
      - name: Set Tag
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PIPELINE_TOKEN }}

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ matrix.image }}:${{ env.SHORT_SHA }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
       
  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-push, security_scan]

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Fetch DB URL from SSM
        run: |
          DB_URL=$(aws ssm get-parameter \
            --name "/gocart/staging/database_url" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text \
            --region ap-south-1)
          echo "DB_URL=$DB_URL" >> $GITHUB_ENV

      - name: Set Tag
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Deploy & Verify Staging
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          scp -o StrictHostKeyChecking=no docker-compose.yml ubuntu@${{ vars.STAGING_SERVER_IP }}:/app/docker-compose.yml

          # Pass DB_URL and SHORT_SHA directly as environment variables into the SSH session
          ssh -o StrictHostKeyChecking=no ubuntu@${{ vars.STAGING_SERVER_IP }} \
          "SHORT_SHA='$SHORT_SHA' DATABASE_URL_FROM_SSM='${{ env.DB_URL }}' bash -s" << 'EOF'
          set -e

          sudo mkdir -p /app
          sudo chown ubuntu:ubuntu /app
          cd /app

          # Check if the variable passed from GitHub Actions is empty
          if [ -z "$DATABASE_URL_FROM_SSM" ]; then
            echo "Error: DB_URL from GitHub Actions is empty"
            exit 1
          fi

          echo "Logging into GHCR..."
          echo "${{ secrets.GHCR_PIPELINE_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

          DATABASE_URL="$DATABASE_URL_FROM_SSM" \
          NESTJS_IMAGE_TAG="ghcr.io/lijo-cloud/gocart-api:$SHORT_SHA" \
          NEXTJS_IMAGE_TAG="ghcr.io/lijo-cloud/gocart-web:$SHORT_SHA" \
          NEXT_PUBLIC_API_URL="/api" \
          docker compose up -d --pull always

          sleep 60

          HEALTHY=false
          for i in $(seq 1 30); do
            if curl -f http://localhost:3000/api/health >/dev/null 2>&1; then
              HEALTHY=true
              break
            fi
            sleep 10
          done

          if [ "$HEALTHY" = true ]; then
            docker image prune -af --filter "until=24h" || true
          else
            exit 1
          fi
          EOF
          
  approve_production:
    name: Gate Production Approval
    runs-on: ubuntu-latest
    needs: deploy_staging
    environment: production
    steps:
      - run: echo "🚀 Promotion authorized."

  deploy_production:
    name: AWS CodeDeploy Production Deploy
    runs-on: ubuntu-latest
    needs: [build-and-push, approve_production]
    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Prepare Bundle
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          mkdir -p deploy-bundle
          cat > deploy-bundle/deploy-env.sh << EOF
          export NESTJS_IMAGE_TAG='ghcr.io/lijo-cloud/gocart-api:$SHORT_SHA'
          export NEXTJS_IMAGE_TAG='ghcr.io/lijo-cloud/gocart-web:$SHORT_SHA'
          EOF
          cp appspec.yml deploy-bundle/
          cp -r scripts deploy-bundle/
          cp docker-compose.yml deploy-bundle/

      - name: Upload Artifacts to S3 and Trigger CodeDeploy
        run: |
          cd deploy-bundle && zip -r ../deploy-package.zip . && cd ..
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          S3_KEY="gocart-deploy-$SHORT_SHA.zip"
          
          aws s3 cp deploy-package.zip "s3://${{ vars.AWS_DEPLOY_S3_BUCKET }}/production/$S3_KEY"
          
          DEPLOYMENT_ID=$(aws deploy create-deployment \
            --application-name ${{ vars.CODEDEPLOY_APP_NAME }} \
            --deployment-group-name ${{ vars.CODEDEPLOY_GROUP_NAME }} \
            --file-exists-behavior OVERWRITE \
            --s3-location bucket=${{ vars.AWS_DEPLOY_S3_BUCKET }},bundleType=zip,key=production/$S3_KEY \
            --query "deploymentId" \
            --output text)
            
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_ENV

      - name: Monitor & Rollback on Failure
        run: |
          if aws deploy wait deployment-successful \
              --deployment-id ${{ env.deployment_id }}; then
            echo "✅ Deployment successful!"
          else
            echo "❌ Deployment failed — checking rollback..."
            ROLLBACK_ID=$(aws deploy get-deployment \
              --deployment-id ${{ env.deployment_id }} \
              --query "deploymentInfo.rollbackInfo.rollbackDeploymentId" \
              --output text)
            if [ "$ROLLBACK_ID" != "None" ] && [ -n "$ROLLBACK_ID" ]; then
              echo "Rollback initiated: $ROLLBACK_ID"
              aws deploy wait deployment-successful \
                --deployment-id $ROLLBACK_ID \
                && echo "✅ Rollback successful!" \
                || echo "⚠️ Rollback failed — check console"
            fi
            exit 1
          fi