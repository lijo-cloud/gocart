name: Enterprise Production Pipeline with Auto-Rollback

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: "ghcr.io/lijo-cloud/gocart"

jobs:
  test:
    name: Code Quality & Testing
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          IMAGE=$(echo "${{ env.DOCKER_IMAGE }}" | tr '[:upper:]' '[:lower:]')
          echo "image_tag=$IMAGE:$SHORT_SHA" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image_tag }}
            ghcr.io/lijo-cloud/gocart:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security_scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ needs.build-and-push.outputs.image_tag }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-push, security_scan]

    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy & Verify Staging
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ vars.STAGING_SERVER_IP }} \
            "export IMAGE_TAG='$IMAGE_TAG'; export DATABASE_URL='$DATABASE_URL'; export DOCKER_IMAGE='${{ env.DOCKER_IMAGE }}'; bash -s" << 'EOF'

            mkdir -p /app && cd /app

            CURRENT_IMAGE=$(docker compose images -q app)

            if [ ! -z "$CURRENT_IMAGE" ]; then
              docker tag $CURRENT_IMAGE $DOCKER_IMAGE:stable
            fi

            echo "🧹 Cleaning old Docker images..."
            docker system prune -af || true

            echo "📥 Pulling image on Staging..."
            docker compose pull --quiet || exit 1

            echo "🚀 Updating Staging container..."
            timeout 120 docker compose up -d --force-recreate --wait --no-deps app

            docker ps
            docker compose images

            echo "⏳ Verifying Staging health..."

            for i in $(seq 1 30); do
              if curl -f http://localhost:3000/api/health >/dev/null 2>&1; then
                echo "Healthy"
                break
              fi
              sleep 5
            done

            if curl -f http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "✅ Staging environment is healthy!"
              docker image prune -f
            else
              echo "🚨 Staging failed health check!"

              export IMAGE_TAG="$DOCKER_IMAGE:stable"

              timeout 120 docker compose up -d --force-recreate --wait --no-deps app

              docker ps
              docker compose images

              exit 1
            fi
          EOF

  approve_production:
    name: Gate Production Approval
    runs-on: ubuntu-latest
    needs: deploy_staging
    environment: production

    steps:
      - run: echo "🚀 Promotion authorized by administrator."

  deploy_production:
    name: Zero-Downtime Rolling Production Deploy
    runs-on: ubuntu-latest
    needs: [build-and-push, approve_production]

    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # ================= SERVER 1 =================

      - name: Deregister Server 1 from ALB
        run: |
          aws elbv2 deregister-targets \
            --target-group-arn ${{ vars.TARGET_GROUP_ARN }} \
            --targets Id=${{ vars.PROD_SERVER_1_INSTANCE_ID }}

          echo "Waiting for connection draining..."
          sleep 30

      - name: Deploy & Validate Server 1
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ vars.PROD_SERVER_1_IP }} \
            "export IMAGE_TAG='$IMAGE_TAG'; export DATABASE_URL='$DATABASE_URL'; export DOCKER_IMAGE='${{ env.DOCKER_IMAGE }}'; bash -s" << 'EOF'

            mkdir -p /app && cd /app

            CURRENT_IMAGE=$(docker compose images -q app)

            if [ ! -z "$CURRENT_IMAGE" ]; then
              docker tag $CURRENT_IMAGE $DOCKER_IMAGE:stable
            fi

            echo "🧹 Cleaning old Docker images..."
            docker system prune -af || true

            echo "📥 Pulling image on Staging..."
            docker compose pull --quiet || exit 1

            echo "🚀 Updating Server 1 container..."
            timeout 120 docker compose up -d --force-recreate --wait --no-deps app

            docker ps
            docker compose images

            echo "⏳ Verifying Server 1 health..."

            for i in $(seq 1 30); do
              if curl -f http://localhost:3000/api/health >/dev/null 2>&1; then
                echo "Healthy"
                break
              fi
              sleep 5
            done

            if curl -f http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "✅ Server 1 successfully updated."
              docker image prune -f
            else
              echo "🚨 Server 1 FAILED health checks!"

              export IMAGE_TAG="$DOCKER_IMAGE:stable"

              timeout 120 docker compose up -d --force-recreate --wait --no-deps app

              docker ps
              docker compose images

              exit 1
            fi
          EOF

      - name: Register Server 1 back to ALB
        run: |
          aws elbv2 register-targets \
            --target-group-arn ${{ vars.TARGET_GROUP_ARN }} \
            --targets Id=${{ vars.PROD_SERVER_1_INSTANCE_ID }}
            
      - name: Re-register Server 1 after deploy or rollback
        if: always()
        run: |
          aws elbv2 register-targets \
            --target-group-arn ${{ vars.TARGET_GROUP_ARN }} \
            --targets Id=${{ vars.PROD_SERVER_1_INSTANCE_ID }}
            
      - name: Wait for Server 1 healthy in ALB
        run: |
          for i in $(seq 1 30); do

            STATUS=$(aws elbv2 describe-target-health \
              --target-group-arn ${{ vars.TARGET_GROUP_ARN }} \
              --targets Id=${{ vars.PROD_SERVER_1_INSTANCE_ID }} \
              --query 'TargetHealthDescriptions[0].TargetHealth.State' \
              --output text)

            echo "Current status: $STATUS"

            if [ "$STATUS" = "healthy" ]; then
              echo "✅ Server 1 healthy in ALB"
              exit 0
            fi

            sleep 10
          done

          exit 1

      # ================= SERVER 2 =================

      - name: Deregister Server 2 from ALB
        run: |
          aws elbv2 deregister-targets \
            --target-group-arn ${{ vars.TARGET_GROUP_ARN }} \
            --targets Id=${{ vars.PROD_SERVER_2_INSTANCE_ID }}

          echo "Waiting for connection draining..."
          sleep 30

      - name: Deploy & Validate Server 2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ vars.PROD_SERVER_2_IP }} \
            "export IMAGE_TAG='$IMAGE_TAG'; export DATABASE_URL='$DATABASE_URL'; export DOCKER_IMAGE='${{ env.DOCKER_IMAGE }}'; bash -s" << 'EOF'

            mkdir -p /app && cd /app

            CURRENT_IMAGE=$(docker compose images -q app)

            if [ ! -z "$CURRENT_IMAGE" ]; then
              docker tag $CURRENT_IMAGE $DOCKER_IMAGE:stable
            fi

           echo "🧹 Cleaning old Docker images..."
           docker system prune -af || true

           echo "📥 Pulling image on Staging..."
           docker compose pull --quiet || exit 1

            echo "🚀 Updating Server 2 container..."
            timeout 120 docker compose up -d --force-recreate --wait --no-deps app

            docker ps
            docker compose images

            echo "⏳ Verifying Server 2 health..."

            for i in $(seq 1 30); do
              if curl -f http://localhost:3000/api/health >/dev/null 2>&1; then
                echo "Healthy"
                break
              fi
              sleep 5
            done

            if curl -f http://localhost:3000/api/health >/dev/null 2>&1; then
              echo "✅ Server 2 successfully updated."
              docker image prune -f
            else
              echo "🚨 Server 2 FAILED health checks!"

              export IMAGE_TAG="$DOCKER_IMAGE:stable"

              timeout 120 docker compose up -d --force-recreate --wait --no-deps app

              docker ps
              docker compose images

              exit 1
            fi
          EOF

      - name: Register Server 2 back to ALB
        run: |
          aws elbv2 register-targets \
            --target-group-arn ${{ vars.TARGET_GROUP_ARN }} \
            --targets Id=${{ vars.PROD_SERVER_2_INSTANCE_ID }}

      - name: Re-register Server 2 after deploy or rollback
        if: always()
        run: |
          aws elbv2 register-targets \
            --target-group-arn ${{ vars.TARGET_GROUP_ARN }} \
            --targets Id=${{ vars.PROD_SERVER_2_INSTANCE_ID }}

      - name: Wait for Server 2 healthy in ALB
        run: |
          for i in $(seq 1 30); do

            STATUS=$(aws elbv2 describe-target-health \
              --target-group-arn ${{ vars.TARGET_GROUP_ARN }} \
              --targets Id=${{ vars.PROD_SERVER_2_INSTANCE_ID }} \
              --query 'TargetHealthDescriptions[0].TargetHealth.State' \
              --output text)

            echo "Current status: $STATUS"

            if [ "$STATUS" = "healthy" ]; then
              echo "✅ Server 2 healthy in ALB"
              exit 0
            fi

            sleep 10
          done

          exit 1