name: Enterprise Production Pipeline with Auto-Rollback

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: "ghcr.io/lijo-cloud/gocart"

jobs:
  test:
    name: Code Quality & Testing
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - run: npm ci

  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          IMAGE=$(echo "${{ env.DOCKER_IMAGE }}" | tr '[:upper:]' '[:lower:]')
          echo "image_tag=$IMAGE:$SHORT_SHA" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.image_tag }}
            ghcr.io/lijo-cloud/gocart:latest
          # cache-from: type=gha
          # cache-to: type=gha,mode=max
          no-cache: true

  security_scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ needs.build-and-push.outputs.image_tag }}
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'HIGH,CRITICAL'
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-push, security_scan]

    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Deploy & Verify Staging
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ vars.STAGING_SERVER_IP }} \
          "export IMAGE_TAG='$IMAGE_TAG'; export DOCKER_IMAGE='${{ env.DOCKER_IMAGE }}'; bash -s" << 'EOF'

            set -e

            mkdir -p /app && cd /app

           DB_URL=$(aws ssm get-parameter \
              --name "/gocart/prod/database_url" \
              --with-decryption \
              --query "Parameter.Value" \
              --output text \
              --region ap-south-1)

          if [ -z "$DB_URL" ]; then
            echo "DATABASE_URL is empty"
            exit 1
          fi

            printf "DATABASE_URL=%s\nIMAGE_TAG=%s\n" \
            "$DB_URL" \
            "${{ env.IMAGE_TAG }}" > /app/.env

            cat /app/.env

            echo "📥 Pulling image..."
            docker compose pull --quiet

            echo "🛑 Removing old container..."
            docker compose down --remove-orphans

            echo "🚀 Starting fresh container..."
            docker compose up -d

            echo "⏳ Waiting for app startup..."
            sleep 40

            HEALTHY=false

            for i in $(seq 1 30); do
              if curl -f http://localhost:3000/api/health >/dev/null 2>&1; then
                HEALTHY=true
                echo "✅ Health check passed"
                break
              fi

              echo "Waiting... attempt $i"
              sleep 10
            done

            if [ "$HEALTHY" = true ]; then
              echo "✅ Staging deployment successful"
              docker image prune -af --filter "until=24h" || true
            else
              echo "🚨 Staging deployment failed"
              
              docker logs app-app-1 --tail 100 || true
              docker ps

              exit 1
            fi

          EOF

  approve_production:
    name: Gate Production Approval
    runs-on: ubuntu-latest
    needs: deploy_staging
    environment: production

    steps:
      - run: echo "🚀 Promotion authorized by administrator."

  deploy_production:
    name: Immutable ASG Production Deploy
    runs-on: ubuntu-latest
    needs: [build-and-push, approve_production]

    env:
      IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Get Latest Launch Template Version
        id: lt
        run: |
          VERSION=$(aws ec2 describe-launch-template-versions \
            --launch-template-id ${{ vars.LAUNCH_TEMPLATE_ID }} \
            --versions '$Latest' \
            --query 'LaunchTemplateVersions[0].VersionNumber' \
            --output text)

          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create New Launch Template Version
        run: |

          cat > userdata.sh <<'SCRIPT'
          #!/bin/bash

          exec > /var/log/user-data.log 2>&1

          apt-get update -y
          apt-get install -y docker.io docker-compose-v2 curl awscli

          systemctl enable docker
          systemctl start docker

          mkdir -p /app
          cd /app

          DB_URL=$(aws ssm get-parameter \
            --name "/gocart/prod/database_url" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text \
            --region ${{ vars.AWS_REGION }})

          if [ -z "$DB_URL" ]; then
            echo "DATABASE_URL is empty"
            exit 1
          fi

          printf "DATABASE_URL=%s\nIMAGE_TAG=%s\n" \
          "$DB_URL" \
          "${{ env.IMAGE_TAG }}" > /app/.env

          chmod 600 /app/.env

          cat /app/.env

          cat > docker-compose.yml <<EOF
          services:
            app:
              image: ${{ env.IMAGE_TAG }}

              restart: always

              ports:
                - "3000:3000"

              env_file:
                - .env

              healthcheck:
                test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
                interval: 30s
                timeout: 5s
                retries: 5
          EOF

          TOKEN=$(aws ssm get-parameter \
            --name "/github/ghcr/token" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text \
            --region ${{ vars.AWS_REGION }})

          docker login ghcr.io \
            -u ${{ github.actor }} \
            -p $TOKEN

          docker compose pull
          docker compose up -d

          sleep 20

          docker ps
          curl http://localhost:3000/api/health || true
          docker image prune -af --filter "until=24h"

          SCRIPT

          ENCODED=$(base64 -w 0 userdata.sh)

          aws ec2 create-launch-template-version \
            --launch-template-id ${{ vars.LAUNCH_TEMPLATE_ID }} \
            --source-version ${{ steps.lt.outputs.version }} \
            --launch-template-data "{\"UserData\":\"$ENCODED\"}"

      - name: Cancel Existing Instance Refresh
        run: |

          REFRESH_ID=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name ${{ vars.ASG_NAME }} \
            --query "InstanceRefreshes[?Status=='InProgress'].InstanceRefreshId" \
            --output text)

          if [ ! -z "$REFRESH_ID" ]; then
            echo "Cancelling existing refresh: $REFRESH_ID"

            aws autoscaling cancel-instance-refresh \
              --auto-scaling-group-name ${{ vars.ASG_NAME }}
          else
            echo "No active instance refresh"
          fi

      - name: Pin ASG to Numeric Launch Template Version
        run: |

          VERSION=$(aws ec2 describe-launch-template-versions \
            --launch-template-id ${{ vars.LAUNCH_TEMPLATE_ID }} \
            --versions '$Latest' \
            --query 'LaunchTemplateVersions[0].VersionNumber' \
            --output text)

          echo "Using Launch Template Version: $VERSION"

          aws autoscaling update-auto-scaling-group \
            --auto-scaling-group-name ${{ vars.ASG_NAME }} \
            --launch-template "LaunchTemplateId=${{ vars.LAUNCH_TEMPLATE_ID }},Version=$VERSION"
            
      - name: Start ASG Instance Refresh
        run: |

          VERSION=$(aws ec2 describe-launch-template-versions \
            --launch-template-id ${{ vars.LAUNCH_TEMPLATE_ID }} \
            --versions '$Latest' \
            --query 'LaunchTemplateVersions[0].VersionNumber' \
            --output text)

          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name ${{ vars.ASG_NAME }} \
            --desired-configuration '{
              "LaunchTemplate": {
                "LaunchTemplateId": "${{ vars.LAUNCH_TEMPLATE_ID }}",
                "Version": "'"$VERSION"'"
              }
            }' \
            --preferences '{
              "MinHealthyPercentage": 100,
              "InstanceWarmup": 180,
              "AutoRollback": true
            }'