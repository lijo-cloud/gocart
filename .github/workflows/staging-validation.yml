name: Staging Validation

on:
  # push:
  #   branches:
  #     - main
    workflow_dispatch: #  Allows you to trigger it manually from the Actions tab
env:
  NESTJS_IMAGE: "ghcr.io/lijo-cloud/gocart-api"
  NEXTJS_IMAGE: "ghcr.io/lijo-cloud/gocart-web"

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  test:
    name: Code Quality & Testing
    runs-on: ubuntu-latest

    strategy:
      matrix:
        app: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.app }}/package-lock.json

      - name: Install Dependencies
        working-directory: ${{ matrix.app }}
        run: npm ci

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        include:
          - context: ./backend
            image: ghcr.io/lijo-cloud/gocart-api

          - context: ./frontend
            image: ghcr.io/lijo-cloud/gocart-web

    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PIPELINE_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          pull: true
          tags: |
            ${{ matrix.image }}:${{ steps.vars.outputs.short_sha }}
            ${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security_scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build-and-push

    strategy:
      matrix:
        image:
          - ghcr.io/lijo-cloud/gocart-api
          - ghcr.io/lijo-cloud/gocart-web

    steps:
      - name: Set Tag
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PIPELINE_TOKEN }}

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ matrix.image }}:${{ env.SHORT_SHA }}
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs:
      - build-and-push
      - security_scan

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH Agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Fetch DB URL from SSM
        run: |
          DB_URL=$(aws ssm get-parameter \
            --name "/gocart/staging/database_url" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text \
            --region ap-south-1)

          echo "DB_URL=$DB_URL" >> $GITHUB_ENV

      - name: Deploy & Verify Staging
        run: |
          SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)

          scp -o StrictHostKeyChecking=no docker-compose.yml \
            ubuntu@${{ vars.STAGING_SERVER_IP }}:/app/docker-compose.yml

          ssh -o StrictHostKeyChecking=no \
            ubuntu@${{ vars.STAGING_SERVER_IP }} \
            "SHORT_SHA='$SHORT_SHA' DATABASE_URL_FROM_SSM='${{ env.DB_URL }}' bash -s" << 'EOF'

          set -e

          sudo mkdir -p /app
          sudo chown ubuntu:ubuntu /app

          cd /app

          if [ -z "$DATABASE_URL_FROM_SSM" ]; then
            echo "Database URL missing"
            exit 1
          fi

          echo "Logging into GHCR..."

          echo "${{ secrets.GHCR_PIPELINE_TOKEN }}" | docker login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

          DATABASE_URL="$DATABASE_URL_FROM_SSM" \
          NESTJS_IMAGE_TAG="ghcr.io/lijo-cloud/gocart-api:$SHORT_SHA" \
          NEXTJS_IMAGE_TAG="ghcr.io/lijo-cloud/gocart-web:$SHORT_SHA" \
          NEXT_PUBLIC_API_URL="/api" \
          docker compose up -d --pull always

          echo "Waiting for containers..."
          sleep 60

          HEALTHY_FRONTEND=false
          HEALTHY_BACKEND=false

          for i in $(seq 1 30); do

            if curl -sf http://localhost:3000/ >/dev/null 2>&1; then
              HEALTHY_FRONTEND=true
            fi

            if curl -sf http://localhost:3001/api/health >/dev/null 2>&1; then
              HEALTHY_BACKEND=true
            fi

            if [ "$HEALTHY_FRONTEND" = true ] && [ "$HEALTHY_BACKEND" = true ]; then
              break
            fi

            echo "Waiting for services... attempt $i"
            sleep 10

          done

          if [ "$HEALTHY_FRONTEND" = true ] && [ "$HEALTHY_BACKEND" = true ]; then
            echo "Frontend healthy"
            echo "Backend healthy"

            docker image prune -af --filter "until=48h" || true

            echo "Staging validation successful"
          else
            echo "Staging validation failed"

            docker compose ps || true
            docker compose logs --tail=100 || true

            exit 1
          fi

          EOF