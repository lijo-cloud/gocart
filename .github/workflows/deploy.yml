name: Production SaaS Deployment (Docker Contexts)

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: ghcr.io/${{ lijo-cloud }}/gocart
  INSTANCE_1_IP: ${{ secrets.PROD_SERVER_1_IP }}
  INSTANCE_2_IP: ${{ secrets.PROD_SERVER_2_IP }}

jobs:
  build_and_push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
      image_lower: ${{ steps.string.outputs.image_lower }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - id: vars
        run: echo "short_sha=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Convert Image Name to Lowercase
        id: string
        run: echo "image_lower=$(echo ${{ env.DOCKER_IMAGE }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build and Push Standalone Container
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.string.outputs.image_lower }}:latest
            ${{ steps.string.outputs.image_lower }}:${{ steps.vars.outputs.short_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Native Docker Rolling Deployment
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.ref == 'refs/heads/main'
    env:
      IMAGE_TAG: ${{ needs.build_and_push.outputs.image_lower }}:${{ needs.build_and_push.outputs.short_sha }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure SSH Key & Agent
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 600 ~/.ssh/deploy_key.pem
          echo -e "Host *\n\tStrictHostKeyChecking no\n" > ~/.ssh/config
          # Start SSH agent and load the key so Docker can read it natively
          eval $(ssh-agent -s)
          ssh-add ~/.ssh/deploy_key.pem
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV

      - name: Deploy to NxtGen Server 1
        run: |
          # 1. Create a native connection map straight to Server 1
          docker context create node1 --docker "host=ssh://ubuntu@${{ env.INSTANCE_1_IP }}"
          
          # 2. Execute Docker Compose inside the Node 1 context
          docker --context node1 compose pull
          docker --context node1 compose up -d --remove-orphans
          docker --context node1 image prune -f

      - name: Rolling Deployment Delay
        run: sleep 20 # Gives Server 1 time to boot up and load balancer to shift traffic

      - name: Deploy to NxtGen Server 2
        run: |
          # 1. Create a native connection map straight to Server 2
          docker context create node2 --docker "host=ssh://ubuntu@${{ env.INSTANCE_2_IP }}"
          
          # 2. Execute Docker Compose inside the Node 2 context
          docker --context node2 compose pull
          docker --context node2 compose up -d --remove-orphans
          docker --context node2 image prune -f